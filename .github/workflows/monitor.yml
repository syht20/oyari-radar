name: Oyari Cloud Sniper Two-in-One

on:
  schedule:
    - cron: '13,43 * * * *'  # 📅 每小時的 13 分和 43 分巡邏一次（避開整點，大幅減少塞車延遲問題！）
    - cron: '0 13 * * *'    # 📅 每天世界標準時 13:00（日本晚上 22:00）準時寄報告信！
  workflow_dispatch:        # 支援隨時手動點擊執行測試

jobs:
  # ==========================================
  # 任務一：每半小時的默默巡邏（只找空房，不寄 Daily 信，維持輕量）
  # ==========================================
  half-hourly-check:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 13 * * *'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Basic Dependencies
      run: pip install requests beautifulsoup4

    - name: Execute Sniper Check
      run: python oyari.py check


  # ==========================================
  # 任務二：五大矩陣技術交叉診斷大會師 (100% 獨立排查專用)
  # ==========================================
  daily-visual-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 安裝字體避免截圖變空白豆腐塊
    - name: Install Fonts for Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 🔥 核心更新：補齊五大矩陣相依的全部防偵測與瀏覽器套件
    - name: Install Browser and All Matrix Plugins
      run: |
        pip install requests beautifulsoup4 playwright playwright-stealth
        playwright install chromium

    # 精準導向大範圍診斷矩陣檔案
    - name: Execute Full Matrix Experiment Subsystem
      run: python oyari_test.py daily






