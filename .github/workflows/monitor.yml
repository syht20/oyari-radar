name: Oyari Cloud Sniper Two-in-One

on:
  schedule:
    - cron: '13,43 * * * *'  # 📅 每小時的 13 分和 43 分巡邏一次（避開整點，大幅減少塞車延遲問題！）
    - cron: '0 13 * * *'    # 📅 每天世界標準時 13:00（日本晚上 22:00）準時寄報告信！
  workflow_dispatch:        # 支援隨時手動點擊執行測試

jobs:
  # ==========================================
  # 任務一：每半小時的默默巡邏（只找空房，不寄 Daily 信，維持輕量）
  # ==========================================
  half-hourly-check:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 13 * * *'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Basic Dependencies
      run: pip install requests beautifulsoup4

    - name: Execute Sniper Check
      run: python oyari.py check


  # ==========================================
  # 任務二：每天晚上 22:00（日本時間）的截圖報告信（只有這步需要裝 Playwright）
  # ==========================================
  daily-visual-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 安裝字體避免截圖變空白豆腐塊
    - name: Install Fonts for Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-wqy-zenhei

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 只在這個任務中安裝 playwright，不影響半小時巡邏的效率
    - name: Install Browser and Dependencies
      run: |
        pip install requests beautifulsoup4 playwright
        playwright install chromium

    - name: Execute Daily Report with Screenshot
      run: python oyari.py daily
